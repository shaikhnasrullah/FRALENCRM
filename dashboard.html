<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FRALEN CRM - Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
    }

    .sidebar {
      width: 200px;
      background-color: #1B2A6B;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      color: white;
      padding-top: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
    }

    .sidebar a:hover {
      background-color: #2A3F8F;
    }

    .main {
      margin-left: 200px;
      padding: 20px;
    }

    .topbar {
      background-color: white;
      padding: 15px 20px;
      border-bottom: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h1 {
      font-size: 20px;
      margin: 0;
    }

    #logout-btn {
      background-color: #EF4444;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 5px;
      cursor: pointer;
    }

    .stats-row {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .stat-box {
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px 20px;
      flex: 1;
      min-width: 200px;
    }

    .stat-box h3 {
      margin: 0;
      font-size: 22px;
    }

    .stat-box p {
      margin: 5px 0 0 0;
      color: gray;
      font-size: 13px;
    }

    .chart-box {
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
    }

    .chart-box h3 {
      margin-top: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background-color: #f5f5f5;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 12px;
      color: white;
    }

    .badge-paid {
      background-color: #10B981;
    }

    .badge-pending {
      background-color: #F59E0B;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>FRALEN</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="#">Products</a>
    <a href="#">Inventory</a>
    <a href="#">Purchase</a>
    <a href="customers.html">Customers</a>
    <a href="create-order.html">Add New Sale</a>
    <a href="sales-history.html">Sales History</a>
    <a href="#">Reports</a>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div>
        <span id="user-name">Admin</span>
        <button id="logout-btn">Logout</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <h3 id="stat-customers">0</h3>
        <p>Total Customers</p>
      </div>
      <div class="stat-box">
        <h3 id="stat-today-sales">Rs. 0</h3>
        <p id="stat-today-orders">0 orders today</p>
      </div>
      <div class="stat-box">
        <h3 id="stat-pending-orders">0</h3>
        <p>Pending Orders</p>
      </div>
      <div class="stat-box">
        <h3 id="stat-balance-due">Rs. 0</h3>
        <p>Balance Due</p>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-box">
      <h3>Monthly Sales</h3>
      <canvas id="salesChart" height="80"></canvas>
    </div>

    <!-- Recent Orders Table -->
    <table>
      <thead>
        <tr>
          <th>Customer</th>
          <th>Items</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="recent-orders-tbody">
        <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Simple bar chart setup -->
  <script>
    var salesChart = new Chart(document.getElementById('salesChart'), {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [{
          label: 'Sales',
          data: [0, 0, 0, 0, 0, 0],
          backgroundColor: '#4F6BF0'
        }]
      },
      options: {
        responsive: true
      }
    });
  </script>

  <!-- Firebase login check + data loading -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Firebase config
    var firebaseConfig = {
      apiKey: "AIzaSyBHSFdvPAI1kz91whHbTj0rgUefVhPthLc",
      authDomain: "loginpage1-16430.firebaseapp.com",
      projectId: "loginpage1-16430",
      storageBucket: "loginpage1-16430.firebasestorage.app",
      messagingSenderId: "438297643443",
      appId: "1:438297643443:web:a2a75a2873d2746613e3c6"
    };

    var app = initializeApp(firebaseConfig);
    var auth = getAuth(app);
    var db = getFirestore(app);

    // check if user is logged in
    onAuthStateChanged(auth, function (user) {
      if (!user) {
        window.location.href = "index.html";
      } else {
        var name = (user.email || "Admin").split("@")[0];
        document.getElementById("user-name").textContent = name;
        loadDashboardData();
      }
    });

    // logout button
    document.getElementById("logout-btn").addEventListener("click", async function () {
      await signOut(auth);
      window.location.href = "index.html";
    });

    // helper to check if date is today
    function isToday(dateString) {
      if (!dateString) return false;
      var d = new Date(dateString);
      var now = new Date();
      return d.getDate() === now.getDate() &&
             d.getMonth() === now.getMonth() &&
             d.getFullYear() === now.getFullYear();
    }

    // load all data from firestore
    async function loadDashboardData() {
      try {
        // get customers
        var customerSnapshot = await getDocs(collection(db, "customers"));
        var totalCustomers = customerSnapshot.size;
        document.getElementById("stat-customers").textContent = totalCustomers;

        // get orders
        var orderSnapshot = await getDocs(collection(db, "orders"));
        var todaySales = 0;
        var todayOrders = 0;
        var pendingOrders = 0;
        var balanceDue = 0;
        var allOrders = [];

        orderSnapshot.forEach(function (docItem) {
          var order = docItem.data();
          order.id = docItem.id;
          allOrders.push(order);

          var payable = (order.totals && order.totals.payable) ? order.totals.payable : 0;
          var pending = (order.totals && order.totals.pending) ? order.totals.pending : 0;

          if (isToday(order.createdAt)) {
            todaySales += payable;
            todayOrders += 1;
          }

          if (pending > 0) {
            pendingOrders += 1;
            balanceDue += pending;
          }
        });

        document.getElementById("stat-today-sales").textContent = "Rs. " + todaySales;
        document.getElementById("stat-today-orders").textContent = todayOrders + " orders today";
        document.getElementById("stat-pending-orders").textContent = pendingOrders;
        document.getElementById("stat-balance-due").textContent = "Rs. " + balanceDue;

        // sort orders by newest first and show last 5
        allOrders.sort(function (a, b) {
          return new Date(b.createdAt) - new Date(a.createdAt);
        });

        var recentOrders = allOrders.slice(0, 5);
        var tbody = document.getElementById("recent-orders-tbody");

        if (recentOrders.length === 0) {
          tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No orders yet</td></tr>";
        } else {
          var rows = "";
          for (var i = 0; i < recentOrders.length; i++) {
            var order = recentOrders[i];
            var itemCount = order.products ? order.products.length : 0;
            var amount = (order.totals && order.totals.payable) ? order.totals.payable : 0;
            var dateStr = order.createdAt ? new Date(order.createdAt).toLocaleDateString() : "-";
            var pending = (order.totals && order.totals.pending) ? order.totals.pending : 0;
            var status = pending > 0 ? "Pending" : "Paid";
            var badgeClass = pending > 0 ? "badge-pending" : "badge-paid";

            rows += "<tr>";
            rows += "<td>" + (order.customerName || "-") + "</td>";
            rows += "<td>" + itemCount + " item(s)</td>";
            rows += "<td>Rs. " + amount + "</td>";
            rows += "<td>" + dateStr + "</td>";
            rows += "<td><span class='badge " + badgeClass + "'>" + status + "</span></td>";
            rows += "</tr>";
          }
          tbody.innerHTML = rows;
        }

      } catch (error) {
        console.log("Error loading dashboard data: ", error);
      }
    }
  </script>

</body>
</html>
