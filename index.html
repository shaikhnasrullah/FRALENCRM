<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FRALEN CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1B2A6B; --navy-light:#2A3F8F; --accent:#4F6BF0; --gray:#6B7280; --input-border:#D1D5DB; --bg:#F0F2FA; }
    body { font-family:'Inter',sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; }

    /* SPLASH */
    #splash { position:fixed; inset:0; background:var(--navy); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity 0.6s ease,visibility 0.6s ease; }
    #splash.hide { opacity:0; visibility:hidden; }
    .splash-logo { display:flex; flex-direction:column; align-items:center; gap:16px; animation:fadeUp 0.8s ease forwards; }
    .splash-icon { width:80px; height:80px; background:rgba(255,255,255,0.12); border-radius:22px; display:flex; align-items:center; justify-content:center; }
    .splash-icon svg { width:46px; height:46px; fill:none; stroke:white; stroke-width:1.8; }
    .splash-brand { font-family:'Montserrat',sans-serif; font-size:38px; font-weight:900; color:white; letter-spacing:6px; }
    .splash-brand span { color:#7B93FF; }
    .splash-tagline { font-size:12px; color:rgba(255,255,255,0.45); letter-spacing:3px; text-transform:uppercase; margin-top:-8px; }
    .splash-dots { margin-top:64px; display:flex; gap:8px; animation:fadeUp 0.8s ease 0.3s both; }
    .splash-dots span { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.25); animation:pulse 1.2s ease infinite; }
    .splash-dots span:nth-child(2) { animation-delay:0.2s; }
    .splash-dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes pulse { 0%,100%{background:rgba(255,255,255,0.2);transform:scale(1)} 50%{background:rgba(255,255,255,0.8);transform:scale(1.3)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* AUTH CARD */
    #auth-page { width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; animation:fadeIn 0.6s ease 2.2s forwards; }
    @keyframes fadeIn { to{opacity:1} }
    .auth-card { background:white; border-radius:24px; padding:40px 36px; width:100%; max-width:420px; box-shadow:0 8px 40px rgba(27,42,107,0.10); }

    /* LOGO */
    .auth-logo { text-align:center; margin-bottom:28px; }
    .logo-icon-wrap { width:48px; height:48px; background:var(--navy); border-radius:12px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:8px; }
    .logo-icon-wrap svg { width:26px; height:26px; fill:none; stroke:white; stroke-width:1.8; }
    .logo-brand { font-family:'Montserrat',sans-serif; font-size:24px; font-weight:900; color:var(--navy); letter-spacing:4px; display:block; }
    .logo-brand span { color:var(--accent); }
    .logo-sub { font-size:12px; color:var(--gray); letter-spacing:2px; text-transform:uppercase; }

    /* TABS */
    .auth-tabs { display:flex; border:1.5px solid var(--input-border); border-radius:10px; padding:3px; margin-bottom:24px; }
    .tab-btn { flex:1; padding:9px; border:none; border-radius:8px; font-size:13.5px; font-weight:600; cursor:pointer; transition:all 0.2s; background:none; color:var(--gray); }
    .tab-btn.active { background:var(--navy); color:white; }

    /* FORM */
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:12.5px; font-weight:600; color:#374151; margin-bottom:5px; }
    .form-group input { width:100%; padding:11px 14px; border:1.5px solid var(--input-border); border-radius:9px; font-size:14px; font-family:'Inter',sans-serif; color:#111827; outline:none; transition:border-color 0.2s; background:#FAFAFA; }
    .form-group input:focus { border-color:var(--accent); background:white; }
    input::placeholder { color:#9CA3AF; }

    .btn-auth { width:100%; padding:13px; background:var(--navy); color:white; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:background 0.2s; margin-top:4px; }
    .btn-auth:hover { background:var(--navy-light); }
    .btn-auth:disabled { opacity:0.65; cursor:not-allowed; }

    .error-msg { background:#FEF2F2; color:#DC2626; border:1px solid #FECACA; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:14px; display:none; }
    .success-msg { background:#ECFDF5; color:#065F46; border:1px solid #A7F3D0; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:14px; display:none; }

    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:#E5E7EB; }
    .divider span { color:#9CA3AF; font-size:12px; white-space:nowrap; }

    .social-btns { display:flex; gap:12px; }
    .social-btn { flex:1; padding:10px; border:1.5px solid var(--input-border); border-radius:10px; background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color 0.2s; }
    .social-btn:hover { border-color:#9CA3AF; }
    .social-btn svg { width:20px; height:20px; }

    .shop-hint { font-size:12px; color:var(--gray); text-align:center; margin-top:16px; }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">
    <div class="splash-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg></div>
    <div class="splash-brand">FRAL<span>EN</span></div>
    <div class="splash-tagline">Optical CRM</div>
  </div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<!-- AUTH PAGE -->
<div id="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon-wrap"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg></div>
      <span class="logo-brand">FRAL<span>EN</span></span>
      <div class="logo-sub">Optical CRM</div>
    </div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="Enter your email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password"/>
      </div>
      <button class="btn-auth" id="login-btn" onclick="handleLogin()">Sign In</button>

      <div class="divider"><span>- Or sign in with -</span></div>
      <div class="social-btns">
        <button class="social-btn">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </button>
        <button class="social-btn">
          <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/></svg>
        </button>
        <button class="social-btn">
          <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#000"/></svg>
        </button>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label>Shop / Business Name</label>
        <input type="text" id="signup-shop" placeholder="e.g. Star Opticals"/>
      </div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="signup-name" placeholder="Full name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="email@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters"/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm" placeholder="Re-enter password"/>
      </div>
      <button class="btn-auth" id="signup-btn" onclick="handleSignup()">Create Account</button>
      <div class="shop-hint">🏪 Each shop gets its own private account — data never shared.</div>
    </div>

  </div>
</div>

<script>
  setTimeout(() => document.getElementById('splash').classList.add('hide'), 2000);

  function switchTab(tab) {
    document.getElementById('form-login').style.display  = tab === 'login'  ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active',  tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }
  function hideMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const isLogin = document.getElementById('form-login').style.display !== 'none';
      isLogin ? handleLogin() : handleSignup();
    }
  });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword,
    signInWithEmailAndPassword, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBHSFdvPAI1kz91whHbTj0rgUefVhPthLc",
    authDomain: "loginpage1-16430.firebaseapp.com",
    projectId: "loginpage1-16430",
    storageBucket: "loginpage1-16430.firebasestorage.app",
    messagingSenderId: "438297643443",
    appId: "1:438297643443:web:a2a75a2873d2746613e3c6"
  });
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Already logged in → go to dashboard
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = "dashboard.html";
  });

  // ── LOGIN ──
  window.handleLogin = async function() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn      = document.getElementById('login-btn');
    if (!email || !password) { showError('Email aur password daalo.'); return; }
    btn.textContent = 'Signing in...'; btn.disabled = true;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged will redirect
    } catch (e) {
      const msgs = {
        'auth/user-not-found':     'Yeh email registered nahi hai.',
        'auth/wrong-password':     'Password galat hai.',
        'auth/invalid-credential': 'Email ya password galat hai.',
        'auth/too-many-requests':  'Bahut zyada attempts. Thodi der baad try karo.',
      };
      showError(msgs[e.code] || e.message);
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  };

  // ── SIGNUP ──
  window.handleSignup = async function() {
    const shopName = document.getElementById('signup-shop').value.trim();
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm  = document.getElementById('signup-confirm').value;
    const btn      = document.getElementById('signup-btn');

    if (!shopName) { showError('Shop name daalo.'); return; }
    if (!name)     { showError('Apna naam daalo.'); return; }
    if (!email)    { showError('Email daalo.'); return; }
    if (password.length < 6) { showError('Password kam se kam 6 characters ka hona chahiye.'); return; }
    if (password !== confirm)  { showError('Passwords match nahi kar rahe.'); return; }

    btn.textContent = 'Creating account...'; btn.disabled = true;
    try {
      // 1. Create Firebase Auth account
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid  = cred.user.uid;

      // 2. Save shop profile under users/{uid}
      await setDoc(doc(db, "users", uid), {
        shopName,
        ownerName: name,
        email,
        createdAt: serverTimestamp(),
        plan: 'free',
      });

      showSuccess(`✅ Account created for "${shopName}"! Redirecting...`);
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
    } catch (e) {
      const msgs = {
        'auth/email-already-in-use': 'Yeh email already registered hai. Login karo.',
        'auth/invalid-email':        'Email format sahi nahi hai.',
        'auth/weak-password':        'Password zyada strong banana hoga.',
      };
      showError(msgs[e.code] || e.message);
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
  };
</script>

</body>
</html>
