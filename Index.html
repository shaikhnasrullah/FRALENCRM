<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FRALEN CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B2A6B;
      --navy-dark: #111C4E;
      --navy-light: #2A3F8F;
      --accent: #4F6BF0;
      --white: #FFFFFF;
      --gray: #6B7280;
      --input-border: #D1D5DB;
      --bg: #F0F2FA;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #splash.hide {
      opacity: 0;
      visibility: hidden;
    }

    .splash-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeUp 0.8s ease forwards;
    }

    .splash-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.12);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-icon svg {
      width: 46px;
      height: 46px;
      fill: none;
      stroke: white;
      stroke-width: 1.8;
    }

    .splash-brand {
      font-family: 'Montserrat', sans-serif;
      font-size: 38px;
      font-weight: 900;
      color: white;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .splash-brand span {
      color: #7B93FF;
    }

    .splash-tagline {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: -8px;
    }

    .splash-dots {
      margin-top: 64px;
      display: flex;
      gap: 8px;
      animation: fadeUp 0.8s ease 0.3s both;
    }

    .splash-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      animation: pulse 1.2s ease infinite;
    }

    .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { background: rgba(255,255,255,0.2); transform: scale(1); }
      50% { background: rgba(255,255,255,0.8); transform: scale(1.3); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGIN PAGE ── */
    #login-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      animation: fadeIn 0.6s ease 2.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(27,42,107,0.10);
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .login-logo-icon {
      width: 38px;
      height: 38px;
      background: var(--navy);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-logo-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: white;
      stroke-width: 1.8;
    }

    .login-logo-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: 4px;
    }

    .login-logo-text span {
      color: var(--accent);
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--gray);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
      text-align: left;
      margin-top: 28px;
    }

    .login-desc {
      font-size: 13px;
      color: var(--gray);
      text-align: left;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #111827;
      outline: none;
      transition: border-color 0.2s;
      background: #FAFAFA;
    }

    input:focus {
      border-color: var(--accent);
      background: white;
    }

    input::placeholder { color: #9CA3AF; }

    .forgot {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 18px;
    }

    .forgot a {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .btn-signin {
      width: 100%;
      padding: 14px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-signin:hover { background: var(--navy-light); }
    .btn-signin:active { transform: scale(0.99); }

    .btn-signin.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #D1D5DB;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }

    .divider span { color: #9CA3AF; white-space: nowrap; }

    .social-btns {
      display: flex;
      gap: 12px;
    }

    .social-btn {
      flex: 1;
      padding: 11px;
      border: 1.5px solid var(--input-border);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .social-btn:hover { background: #F9FAFB; border-color: #9CA3AF; }

    .social-btn svg { width: 20px; height: 20px; }

    .signup-link {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--gray);
    }

    .signup-link a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .error-msg {
      background: #FEF2F2;
      color: #DC2626;
      border: 1px solid #FECACA;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-logo">
      <div class="splash-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
      </div>
      <div class="splash-brand">FRAL<span>EN</span></div>
      <div class="splash-tagline">Optical CRM</div>
    </div>
    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- LOGIN PAGE -->
  <div id="login-page">
    <div class="login-card">

      <div class="login-header">
        <div class="login-logo">
          <div class="login-logo-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          </div>
          <div class="login-logo-text">FRAL<span>EN</span></div>
        </div>
        <div class="login-subtitle">Optical CRM</div>
      </div>

      <div class="login-title">Login to your Account</div>
      <div class="login-desc">Welcome back! Please enter your details.</div>

      <br/>

      <div class="error-msg" id="error-msg">Invalid email or password. Please try again.</div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <div class="forgot"><a href="#">Forgot password?</a></div>

      <button class="btn-signin" id="signin-btn" onclick="handleLogin()">Sign In</button>

      <div class="divider"><span>- Or sign in with -</span></div>

      <div class="social-btns">
        <!-- Google -->
        <button class="social-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>
        <!-- Facebook -->
        <button class="social-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
          </svg>
        </button>
        <!-- Twitter/X -->
        <button class="social-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#000"/>
          </svg>
        </button>
      </div>

      <div class="signup-link">
        Don't have an account? <a href="#">Sign up</a>
      </div>

    </div>
  </div>

  <script>
    // Hide splash after 2 seconds
    setTimeout(() => {
      document.getElementById('splash').classList.add('hide');
    }, 2000);

    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signin-btn');
      const err = document.getElementById('error-msg');

      err.style.display = 'none';

      if (!email || !password) {
        err.textContent = 'Please enter your email and password.';
        err.style.display = 'block';
        return;
      }

      btn.textContent = 'Signing in...';
      btn.classList.add('loading');

      // Firebase auth aayega yahan
      setTimeout(() => {
        btn.textContent = 'Sign In';
        btn.classList.remove('loading');
        // dashboard.html pe redirect hoga
        // window.location.href = 'dashboard.html';
        alert('Firebase connect karo phir redirect hoga dashboard pe!');
      }, 1500);
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
<script type="module" src="app.js"></script>

</body>
</html>
